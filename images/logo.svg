<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" role="img" aria-label="Fanmo Education Technology">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6914"/>
      <stop offset="45%" style="stop-color:#e8c870"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c870"/>
      <stop offset="100%" style="stop-color:#8b6914"/>
    </linearGradient>
  </defs>
  <!-- Diamond mark -->
  <polygon points="22,6 36,22 22,38 8,22" fill="none" stroke="url(#goldGrad)" stroke-width="1.4"/>
  <polygon points="22,12 30,22 22,32 14,22" fill="url(#goldGrad)" opacity="0.85"/>
  <!-- F letter inside mark -->
  <line x1="17" y1="18" x2="27" y2="18" stroke="#050507" stroke-width="1.8"/>
  <line x1="17" y1="22" x2="24" y2="22" stroke="#050507" stroke-width="1.8"/>
  <line x1="17" y1="18" x2="17" y2="27" stroke="#050507" stroke-width="1.8"/>
  <!-- Company name -->
  <text x="46" y="27" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" letter-spacing="3" fill="url(#goldGrad)">FANMO</text>
  <!-- Tagline -->
  <text x="47" y="41" font-family="Arial, sans-serif" font-size="7.5" font-weight="400" letter-spacing="2.5" fill="#888888">EDUCATION TECHNOLOGY</text>
  <!-- Gold separator line -->
  <line x1="46" y1="30.5" x2="210" y2="30.5" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.5"/>
</svg>
